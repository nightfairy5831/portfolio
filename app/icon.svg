<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b7cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0b1a30"/>
  <!-- Outer glow border -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="url(#g)" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Left bracket < -->
  <polyline points="12,9 6,16 12,23" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <polyline points="20,9 26,16 20,23" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Forward slash / -->
  <line x1="18" y1="7" x2="14" y2="25" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
</svg>
